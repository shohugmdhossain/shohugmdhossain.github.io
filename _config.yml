title: "About Me"
name: "X X X"
email: "xyz@gmail.com"
description: >-
  Doctoral Fellow in Earth Science @ University of Calgary
url: "https://shohugmdhossain.github.io"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Build
markdown: kramdown
paginate: 5
paginate_path: "/page:num/"
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# Author box (sidebar)
author:
  name   : "X X X"
  avatar : "/images/shohug.jpg"
  bio    : "PhD Student in Earth Science · Remote Sensing & Planetary Science"
  location: "Calgary, Alberta, Canada"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/shohugmdhossain"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/md-shohug-hossain/"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=YOURID"

# Show author sidebar profile (LinkedIn-style left column)
show_author_profile: true

# Default layout settings
defaults:
  # Apply to all posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true

  # Apply to homepage
  - scope:
      path: ""
      type: pages
    values:
      layout: home
      author_profile: true

# Custom CSS
sass:
  style: compressed

include:
  - assets






