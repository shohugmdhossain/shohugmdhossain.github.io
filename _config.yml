# Build
markdown: kramdown
paginate: 5
paginate_path: "/page:num/"
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# Author box (sidebar)
author:
  name   : "Md Shohug Hossain"
  avatar : "/images/shohug.jpg"
  bio    : "PhD Student in Earth & Energy Science @ University of Calgary"
  location: "Calgary, Alberta, Canada"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/shohugmdhossain"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/md-shohug-hossain/"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=YOURID"

# Custom CSS
sass:
  style: compressed

include:
  - assets





